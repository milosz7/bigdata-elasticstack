filebeat.inputs:
  # ŹRÓDŁO 1: Czytanie z pliku (poprzedni sposób)
  - type: filestream
    id: usos-file-logs
    paths:
      - /var/log/usos/*.json
    processors:
#    json.keys_under_root: true
#    json.overwrite_keys: true
#    json.add_error_key: true

  # ŹRÓDŁO 2: Nasłuchiwanie w sieci na porcie 9000
  - type: tcp
    enabled: true
    id: usos-tcp-logs
    host: "0.0.0.0:9000"
    json.keys_under_root: true
    json.overwrite_keys: true
    json.add_error_key: true

processors:
#  - drop_fields:
#      fields: ["agent", "log", "input", "ecs", "host", "container"]
#      ignore_missing: true
  - decode_json_fields:
      fields: ["message"]
      target: ""
      overwrite_keys: true
  - script:
      lang: javascript
      source: >
        function process(event) {
          var lat = event.Get("lat");
          var lon = event.Get("lon");
          if (lat !== null && lon !== null) {
            event.Put("location", {
              "lat": lat,
              "lon": lon
            });
          }
        }

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]

setup.kibana:
  host: "kibana:5601"

setup.template.settings:
  index.mapping.total_fields.limit: 10000
  
setup.template.append_fields:
  - name: location
    type: geo_point
